services:

  # ─── Base de données MySQL ─────────────────────────────────
  db:
    image: mysql:8.0
    container_name: benin_tourisme_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: benin_tourisme
      MYSQL_USER: benin_user
      MYSQL_PASSWORD: benin_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - benin_network

  # ─── phpMyAdmin (interface web pour la DB) ─────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: benin_tourisme_pma
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - benin_network

  # ─── Application Laravel ───────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: benin_tourisme_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./storage:/var/www/storage
    ports:
      - "8000:8000"
    depends_on:
      - db
    networks:
      - benin_network
    command: php artisan serve --host=0.0.0.0 --port=8000

volumes:
  db_data:

networks:
  benin_network:
    driver: bridge