services:

  # ─── Base de données MySQL ─────────────────────────────────
  db:
    image: mysql:8.0
    container_name: benin_tourisme_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: benin_tourisme
      MYSQL_USER: benin_user
      MYSQL_PASSWORD: benin_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - benin_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── phpMyAdmin ────────────────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: benin_tourisme_pma
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - benin_network

  # ─── Application Laravel (Apache) ──────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: benin_tourisme_app
    restart: unless-stopped
    working_dir: /var/www
    ports:
      - "8000:80"   # Apache écoute sur 80, on expose sur 8000
    depends_on:
      db:
        condition: service_healthy
    networks:
      - benin_network
    volumes:
      - .:/var/www
      - /var/www/vendor  # vendor isolé dans le container
      - ./storage:/var/www/storage
    # Pas de 'command' — Apache démarre automatiquement via Dockerfile CMD

volumes:
  db_data:

networks:
  benin_network:
    driver: bridge